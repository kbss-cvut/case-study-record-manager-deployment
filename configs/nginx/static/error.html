<!-- Record manager Nginx reverse proxy-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title><!--# echo var="status" default="" --> | Record Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!--# if expr="$status = 502" -->
  <meta http-equiv="refresh" content="2" />
  <!--# endif -->

  <style type="text/css">
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-muted: #f8fafc;
      --surface-hover: #f3f7fb;

      --border: #d7dde5;
      --border-strong: #b8c2cc;

      --text: #17202a;
      --muted: #5f6b7a;

      --danger: #a33131;

      --radius: 14px;
      --shadow-card: 0 6px 20px rgba(16, 24, 40, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;

      background: var(--bg);
      color: var(--text);

      font-family:
              Inter,
              ui-sans-serif,
              system-ui,
              -apple-system,
              BlinkMacSystemFont,
              "Segoe UI",
              Roboto,
              Arial,
              sans-serif;

      font-size: 15px;
      line-height: 1.5;
    }

    .content {
      width: min(100% - 64px, 1400px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 42px 0;

      display: grid;
      place-items: center;
    }

    .error-card {
      width: min(920px, 100%);
      min-height: 360px;
      padding: 78px 104px;

      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-card);

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      text-align: center;
    }

    .error-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      margin-bottom: 34px;
      padding: 10px 22px;

      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-muted);

      color: var(--muted);
      font-size: 16px;
      line-height: 1.2;
      font-weight: 800;

      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .error-dot {
      width: 10px;
      height: 10px;

      border-radius: 999px;
      background: var(--danger);
    }

    .error-card h2 {
      max-width: 760px;
      margin: 0 auto;

      color: var(--text);
      font-size: 32px;
      line-height: 1.18;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .error-card p {
      width: min(100%, 760px);
      margin: 22px auto 0;

      color: var(--muted);
      font-size: 19px;
      line-height: 1.5;
      font-weight: 500;
    }

    .error-actions {
      width: min(100%, 760px);
      margin-top: 34px;
      padding-top: 28px;

      border-top: 1px solid var(--border);

      display: flex;
      justify-content: center;
    }

    .error-button {
      min-height: 40px;
      padding: 0 18px;

      border: 1px solid var(--border-strong);
      border-radius: 7px;
      background: var(--surface);

      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      cursor: pointer;
    }

    .error-button:hover {
      background: var(--surface-hover);
    }

    @media (max-width: 720px) {
      .content {
        width: min(100% - 32px, 1400px);
        padding: 32px 0;
      }

      .error-card {
        width: 100%;
        min-height: 320px;
        padding: 52px 34px;
      }

      .error-status {
        margin-bottom: 28px;
        padding: 9px 17px;
        font-size: 14px;
      }

      .error-card h2 {
        font-size: 26px;
      }

      .error-card p {
        font-size: 16px;
      }

      .error-actions {
        margin-top: 28px;
        padding-top: 22px;
      }
    }

    @media (max-width: 420px) {
      .content {
        width: min(100% - 28px, 1400px);
        padding: 24px 0;
      }

      .error-card {
        min-height: 280px;
        padding: 40px 24px;
      }

      .error-status {
        margin-bottom: 22px;
        padding: 8px 14px;
        font-size: 13px;
      }

      .error-dot {
        width: 8px;
        height: 8px;
      }

      .error-card h2 {
        font-size: 22px;
      }

      .error-card p {
        margin-top: 16px;
        font-size: 14px;
      }

      .error-actions {
        margin-top: 24px;
        padding-top: 20px;
      }

      .error-button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
<main class="content">
  <section class="error-card">
    <div class="error-status">
      <span class="error-dot" aria-hidden="true"></span>
      <span>Status <!--# echo var="status" default="" --></span>
    </div>

    <!--# if expr="$status = 502" -->
    <h2>The application is currently being updated</h2>
    <p>
      You will be redirected to the new version in a few seconds.
      If you see this message for more than a minute, something has gone wrong.
    </p>
    <!--# else -->
    <h2>Sorry, something went wrong.</h2>
    <!--# endif -->

    <div class="error-actions">
      <a class="error-button" href="/">Go back</a>
    </div>
  </section>
</main>
</body>
</html>
